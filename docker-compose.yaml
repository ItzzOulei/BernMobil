version: '3.8'

networks:
  neo4j-internal:

services:
  core1:
    image: neo4j:5-enterprise
    container_name: core1
    networks:
      - neo4j-internal
    ports:
      - "7474:7474" 
      - "7687:7687" 
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_AUTH=neo4j/bernmobil123
      - NEO4J_server_config_strict__validation_enabled=false
      - NEO4J_initial_server_mode__constraint=PRIMARY
      - NEO4J_dbms_cluster_discovery_endpoints=core1:5000,core2:5000,core3:5000
      - NEO4J_server_discovery_advertised__address=core1:5000
      - NEO4J_server_cluster_advertised__address=core1:6000
      - NEO4J_server_cluster_raft_advertised__address=core1:7000
      - NEO4J_server_routing_advertised__address=localhost:7687
      - NEO4J_server_cluster_network_shared__secret=BernmobilClusterGeheimnis123!
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=512m

  core2:
    image: neo4j:5-enterprise
    container_name: core2
    networks:
      - neo4j-internal
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_AUTH=neo4j/bernmobil123
      - NEO4J_server_config_strict__validation_enabled=false
      - NEO4J_initial_server_mode__constraint=PRIMARY
      - NEO4J_dbms_cluster_discovery_endpoints=core1:5000,core2:5000,core3:5000
      - NEO4J_server_discovery_advertised__address=core2:5000
      - NEO4J_server_cluster_advertised__address=core2:6000
      - NEO4J_server_cluster_raft_advertised__address=core2:7000
      - NEO4J_server_routing_advertised__address=localhost:7688
      - NEO4J_server_cluster_network_shared__secret=BernmobilClusterGeheimnis123!
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=512m

  core3:
    image: neo4j:5-enterprise
    container_name: core3
    networks:
      - neo4j-internal
    ports:
      - "7476:7474"
      - "7689:7687"
    environment:
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_AUTH=neo4j/bernmobil123
      - NEO4J_server_config_strict__validation_enabled=false
      - NEO4J_initial_server_mode__constraint=PRIMARY
      - NEO4J_dbms_cluster_discovery_endpoints=core1:5000,core2:5000,core3:5000
      - NEO4J_server_discovery_advertised__address=core3:5000
      - NEO4J_server_cluster_advertised__address=core3:6000
      - NEO4J_server_cluster_raft_advertised__address=core3:7000
      - NEO4J_server_routing_advertised__address=localhost:7689
      - NEO4J_server_cluster_network_shared__secret=BernmobilClusterGeheimnis123!
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=512m