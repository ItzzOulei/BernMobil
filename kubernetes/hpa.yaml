apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neo4j-read-replica-hpa
  namespace: bernmobil
spec:
  # The HPA targets the Neo4j Read Replica StatefulSet (or Deployment) generated by Helm.
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    # For a helm release named "my-neo4j", the read replicas are typically named: my-neo4j-neo4j-cluster-read-replica
    # This assumes we install the helm chart with name: `my-neo4j`
    name: my-neo4j-neo4j-cluster-read-replica
  minReplicas: 1
  maxReplicas: 10
  metrics:
  # Example: Scaling based on CPU utilization > 70%
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
